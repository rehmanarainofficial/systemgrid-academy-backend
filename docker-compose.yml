name: systemgrid-academy-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: systemgrid_academy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-systemgrid_academy}
      POSTGRES_USER: ${DATABASE_USER:-systemgrid}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-systemgrid_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - systemgrid_academy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-systemgrid} -d ${DATABASE_NAME:-systemgrid_academy}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - systemgrid_academy_network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: systemgrid-academy-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@systemgrid.academy}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - systemgrid_academy_pgadmin_data:/var/lib/pgadmin
    networks:
      - systemgrid_academy_network

volumes:
  systemgrid_academy_postgres_data:
    driver: local
  systemgrid_academy_pgadmin_data:
    driver: local

networks:
  systemgrid_academy_network:
    driver: bridge
