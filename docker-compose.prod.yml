name: systemgrid-academy-production

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: systemgrid-academy-api:latest
    container_name: systemgrid_academy_api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_SYNCHRONIZE: "false"
      NODE_ENV: production
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - systemgrid_academy_uploads:/app/uploads
    networks:
      - systemgrid_academy_network

  postgres:
    image: postgres:16-alpine
    container_name: systemgrid_academy_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-systemgrid_academy}
      POSTGRES_USER: ${DATABASE_USER:-systemgrid}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - systemgrid_academy_postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-systemgrid} -d ${DATABASE_NAME:-systemgrid_academy}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - systemgrid_academy_network

  catalog-sync:
    image: node:24-alpine
    profiles:
      - tools
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env.docker
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - systemgrid_academy_network
    command: sh -c "npm ci && npm run seed:sync"

volumes:
  systemgrid_academy_postgres_data:
    driver: local
  systemgrid_academy_uploads:
    driver: local

networks:
  systemgrid_academy_network:
    driver: bridge
